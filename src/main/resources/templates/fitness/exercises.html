<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/header :: header-css}"/>
    <style>
        .exercise-img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
            cursor: zoom-in;
        }
        .exercise-icon {
            font-size: 2rem;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .difficulty-star { color: #ffc107; }
        .difficulty-empty { color: #ddd; }
        .video-thumb {
            cursor: pointer;
            transition: opacity .15s;
        }
        .video-thumb:hover { opacity: .8; }
        #videoModalBody iframe, #videoModalBody video {
            width: 100%;
            height: 360px;
            border: none;
        }
        #imageModalBody img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
    <script>
        function filterExercises() {
            var nameFilter = document.getElementById('nameFilter').value.toLowerCase();
            var catFilter  = document.getElementById('catFilter').value;
            document.querySelectorAll('.ex-row').forEach(function(row) {
                var nameMatch = !nameFilter || row.dataset.name.toLowerCase().includes(nameFilter.toLowerCase());
                var catMatch  = !catFilter  || row.dataset.category.toUpperCase() === catFilter.toUpperCase();
                row.style.display = (nameMatch && catMatch) ? '' : 'none';
            });
        }

        window.openImageModal = function(imageUrl, exerciseName) {
            var body = document.getElementById('imageModalBody');
            var title = document.getElementById('imageModalLabel');
            if (!body || !title) return;
            title.textContent = exerciseName;
            body.innerHTML = '<img src="' + imageUrl + '" alt="' + exerciseName + '">';
            
            var modalElement = document.getElementById('imageModal');
            if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                var modal = bootstrap.Modal.getOrCreateInstance(modalElement);
                modal.show();
            } else if (window.jQuery && typeof jQuery.fn.modal === 'function') {
                $(modalElement).modal('show');
            }
        };

        window.openVideoModal = function(videoUrl, exerciseName) {
            console.log('Called openVideoModal for:', exerciseName, videoUrl);
            var body = document.getElementById('videoModalBody');
            var title = document.getElementById('videoModalLabel');
            if (!body || !title) {
                console.error('Modal elements missing!', {body: body, title: title});
                return;
            }
            title.textContent = exerciseName;

            var youtubeMatch = videoUrl.match(
                /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/|v\/)|youtu\.be\/)([A-Za-z0-9_\-]{11})/
            );
            if (youtubeMatch) {
                body.innerHTML = '<iframe src="https://www.youtube.com/embed/' + youtubeMatch[1]
                    + '?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
            } else {
                body.innerHTML = '<video src="' + videoUrl + '" controls autoplay style="width:100%; height:360px;"></video>';
            }

            var modalElement = document.getElementById('videoModal');
            if (!modalElement) {
                console.error('videoModal element not found');
                return;
            }

            if (typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                console.log('Opening modal via Bootstrap for:', exerciseName);
                try {
                    var modal = bootstrap.Modal.getOrCreateInstance(modalElement);
                    if (modal) {
                        modal.show();
                        console.log('modal.show() called');
                    } else {
                        console.error('Could not get or create Bootstrap modal instance');
                    }
                } catch (e) {
                    console.error('Error with bootstrap.Modal.getOrCreateInstance:', e);
                    // Fallback to manual initialization if getOrCreateInstance fails
                    var modal = new bootstrap.Modal(modalElement);
                    modal.show();
                    console.log('modal.show() called after manual init');
                }
            } else if (window.jQuery && typeof jQuery.fn.modal === 'function') {
                console.log('Trying jQuery fallback for modal');
                $(modalElement).modal('show');
            } else {
                console.warn('Bootstrap is not loaded. Typeof bootstrap:', typeof bootstrap);
                alert('Video konnte nicht geladen werden (Bootstrap fehlt).');
            }

            modalElement.addEventListener('hidden.bs.modal', function() {
                body.innerHTML = '';
            }, { once: true });
        };

        document.addEventListener('DOMContentLoaded', function() {
            console.log('Exercises page DOMContentLoaded');
            filterExercises();
            document.querySelectorAll('.video-play-btn').forEach(function(btn) {
                try {
                    console.log('Binding click to button for:', btn.dataset.exerciseName);
                    btn.addEventListener('click', function(e) {
                        console.log('Button clicked for:', btn.dataset.exerciseName);
                        e.stopPropagation();
                        window.openVideoModal(btn.dataset.videoUrl, btn.dataset.exerciseName);
                    });
                } catch (err) {
                    console.error('Error binding button click:', err, btn);
                }
            });

            console.log('Binding click to images for zoom...');
            document.querySelectorAll('.exercise-img').forEach(function(img) {
                try {
                    img.addEventListener('click', function(e) {
                        e.stopPropagation();
                        console.log('Image clicked for zoom:', img.dataset.exerciseName);
                        window.openImageModal(img.dataset.imageUrl, img.dataset.exerciseName);
                    });
                } catch (err) {
                    console.error('Error binding image click:', err, img);
                }
            });

            console.log('Finished binding buttons and images, now binding rows...');
            document.querySelectorAll('.ex-row').forEach(function(row) {
                try {
                    if (!row.dataset.videoUrl || row.dataset.videoUrl === 'null' || row.dataset.videoUrl === '') {
                        return;
                    }
                    console.log('Binding click to row for:', row.dataset.exerciseName);
                    row.style.cursor = 'pointer';
                    row.addEventListener('click', function(e) {
                        if (e.target.closest('button')) return; // let button handle its own click
                        console.log('Row clicked for:', row.dataset.exerciseName);
                        window.openVideoModal(row.dataset.videoUrl, row.dataset.exerciseName);
                    });
                } catch (err) {
                    console.error('Error binding row click:', err, row);
                }
            });
        });
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header}"/>
<div th:replace="~{fragments/sidebar :: sidebar}"/>

<main id="main" class="main">

    <div class="pagetitle">
        <h1>&Uuml;bungskatalog</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/fitness/overview}">Fitness</a></li>
                <li class="breadcrumb-item active">&Uuml;bungskatalog</li>
            </ol>
        </nav>
    </div>

    <div class="card">
        <div class="card-body">

            <!-- Filters -->
            <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
                <div class="input-group" style="max-width:300px;">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="nameFilter" class="form-control"
                           placeholder="Nach Name suchen…" oninput="filterExercises()">
                </div>
                <select class="form-select w-auto" id="catFilter" onchange="filterExercises()">
                    <option value="">Alle Kategorien</option>
                    <option value="RUNNING">Laufen</option>
                    <option value="WARM_UP">Aufw&auml;rmen</option>
                    <option value="CORE">Core</option>
                    <option value="UPPER_BODY">Oberk&ouml;rper</option>
                    <option value="LOWER_BODY">Unterk&ouml;rper</option>
                    <option value="COOL_DOWN">Abk&uuml;hlen</option>
                </select>
                <span class="text-muted small" th:text="${exercises.size()} + ' &Uuml;bungen gesamt'"></span>
            </div>

            <div th:if="${exercises.isEmpty()}" class="text-center py-5">
                <i class="bi bi-journal-x text-muted" style="font-size:3rem;"></i>
                <p class="mt-3 text-muted">Keine &Uuml;bungen gefunden.</p>
            </div>

            <div th:if="${!exercises.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width:80px;"></th>
                            <th>Name</th>
                            <th>Kategorie</th>
                            <th>Tracking</th>
                            <th>Equipment</th>
                            <th>Schwierigkeit</th>
                            <th style="width:80px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ex : ${exercises}"
                            class="ex-row"
                            th:attr="data-name=${ex.name},data-category=${ex.category.name()},data-video-url=${ex.videoUrl},data-exercise-name=${ex.name}">

                            <!-- Image / Icon -->
                            <td>
                                <img th:if="${ex.imageUrl != null}"
                                     th:src="${ex.imageUrl}"
                                     class="exercise-img"
                                     th:alt="${ex.name}"
                                     th:data-image-url="${ex.imageUrl}"
                                     th:data-exercise-name="${ex.name}"
                                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                                <div th:class="${'exercise-icon text-muted ' +
                                        (ex.imageUrl != null ? 'd-none' : 'd-flex')}">
                                    <i th:class="${ex.category.name() == 'RUNNING'    ? 'bi bi-person-walking' :
                                                   ex.category.name() == 'WARM_UP'   ? 'bi bi-thermometer-sun' :
                                                   ex.category.name() == 'CORE'      ? 'bi bi-circle' :
                                                   ex.category.name() == 'UPPER_BODY'? 'bi bi-arrow-up-circle' :
                                                   ex.category.name() == 'LOWER_BODY'? 'bi bi-arrow-down-circle' :
                                                                                        'bi bi-wind'}"></i>
                                </div>
                            </td>

                            <!-- Name + Description -->
                            <td>
                                <strong th:text="${ex.name}"></strong>
                                <div class="text-muted small" th:if="${ex.description != null}"
                                     th:text="${#strings.abbreviate(ex.description, 80)}"></div>
                            </td>

                            <!-- Category -->
                            <td>
                                <span th:switch="${ex.category.name()}">
                                    <span th:case="'RUNNING'"     class="badge bg-success"><i class="bi bi-person-walking me-1"></i>Laufen</span>
                                    <span th:case="'WARM_UP'"     class="badge bg-warning text-dark"><i class="bi bi-thermometer-sun me-1"></i>Aufw&auml;rmen</span>
                                    <span th:case="'CORE'"        class="badge bg-info text-dark"><i class="bi bi-circle me-1"></i>Core</span>
                                    <span th:case="'UPPER_BODY'"  class="badge bg-primary"><i class="bi bi-arrow-up-circle me-1"></i>Oberk&ouml;rper</span>
                                    <span th:case="'LOWER_BODY'"  class="badge bg-danger"><i class="bi bi-arrow-down-circle me-1"></i>Unterk&ouml;rper</span>
                                    <span th:case="'COOL_DOWN'"   class="badge bg-secondary"><i class="bi bi-wind me-1"></i>Abk&uuml;hlen</span>
                                </span>
                            </td>

                            <!-- Tracking type -->
                            <td class="text-muted small">
                                <span th:switch="${ex.trackingType.name()}">
                                    <span th:case="'SETS_REPS'">S&auml;tze / Wdh.</span>
                                    <span th:case="'TIME_BASED'">Zeitbasiert</span>
                                    <span th:case="'DISTANCE_DURATION'">Distanz / Zeit</span>
                                </span>
                            </td>

                            <!-- Equipment -->
                            <td class="text-muted small">
                                <span th:switch="${ex.equipment.name()}">
                                    <span th:case="'NONE'">Kein Equipment</span>
                                    <span th:case="'WALL'">Wand</span>
                                    <span th:case="'CHAIR'">Stuhl</span>
                                    <span th:case="*" th:text="${ex.equipment.name()}"></span>
                                </span>
                            </td>

                            <!-- Difficulty stars -->
                            <td>
                                <span th:each="i : ${#numbers.sequence(1, 5)}">
                                    <i th:class="${i <= ex.difficulty ? 'bi bi-star-fill difficulty-star' : 'bi bi-star difficulty-empty'}"></i>
                                </span>
                            </td>

                            <!-- Video button -->
                            <td>
                                <button th:if="${ex.videoUrl != null and ex.videoUrl != 'null' and ex.videoUrl != ''}"
                                        class="btn btn-sm btn-outline-danger video-thumb video-play-btn"
                                        th:attr="data-video-url=${ex.videoUrl},data-exercise-name=${ex.name}">
                                    <i class="bi bi-play-circle"></i>
                                </button>
                                <span th:if="${ex.videoUrl == null or ex.videoUrl == 'null' or ex.videoUrl == ''}" class="text-muted">&mdash;</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<!-- Image Modal -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="imageModalLabel">Übung</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0 text-center" id="imageModalBody"></div>
        </div>
    </div>
</div>

<!-- Video Modal -->
<div class="modal fade" id="videoModal" tabindex="-1" aria-labelledby="videoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="videoModalLabel">Video</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0" id="videoModalBody"></div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-js}"/>
</body>
</html>
