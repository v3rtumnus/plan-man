<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/header :: header-css}"/>
    <style>
        .star-rating { font-size: 1.8rem; cursor: pointer; }
        .star-rating span { color: #ccc; }
        .star-rating span.active { color: #ffc107; }
    </style>
    <script>
        var difficultyRating = 0;

        function setDifficulty(val) {
            difficultyRating = val;
            document.querySelectorAll('.star-rating span').forEach(function(s, i) {
                s.classList.toggle('active', i < val);
            });
        }

        function submitLog() {
            var duration = parseInt(document.getElementById('totalDuration').value);
            var feedback = document.getElementById('feedbackText').value;
            var exercises = [];

            document.querySelectorAll('.exercise-entry').forEach(function(entry) {
                var exerciseId = parseInt(entry.dataset.exerciseId);
                var orderIndex = parseInt(entry.dataset.orderIndex);
                var trackingType = entry.dataset.trackingType;

                if (trackingType === 'SETS_REPS') {
                    entry.querySelectorAll('.set-row').forEach(function(row) {
                        var setNum = parseInt(row.dataset.setNum);
                        var reps = parseInt(row.querySelector('.reps-input').value) || 0;
                        exercises.push({ exerciseId: exerciseId, orderIndex: orderIndex, setNumber: setNum, repsDone: reps });
                    });
                } else if (trackingType === 'TIME_BASED') {
                    var secs = parseInt(entry.querySelector('.duration-input').value) || 0;
                    exercises.push({ exerciseId: exerciseId, orderIndex: orderIndex, durationSeconds: secs });
                } else if (trackingType === 'DISTANCE_DURATION') {
                    var dist = parseInt(entry.querySelector('.distance-input').value) || 0;
                    var dur = parseInt(entry.querySelector('.run-duration-input').value) || 0;
                    exercises.push({ exerciseId: exerciseId, orderIndex: orderIndex, distanceMeters: dist, durationRunSeconds: dur * 60 });
                }
            });

            var sessionId = parseInt(document.getElementById('planSessionId').value);
            var sessionType = document.getElementById('sessionType').value;

            $.ajax({
                url: '/api/fitness/session-log',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    planSessionId: sessionId,
                    sessionType: sessionType,
                    logDate: new Date().toISOString().slice(0, 10),
                    actualDurationMinutes: duration || null,
                    difficultyRating: difficultyRating || null,
                    feedbackText: feedback || null,
                    exercises: exercises
                }),
                success: function() { window.location.href = '/fitness/history'; },
                error: function() { alert('Fehler beim Speichern. Bitte erneut versuchen.'); }
            });
        }
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header}"/>
<div th:replace="~{fragments/sidebar :: sidebar}"/>

<main id="main" class="main">

    <div class="pagetitle">
        <h1>Session protokollieren</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/fitness/plan}">Trainingsplan</a></li>
                <li class="breadcrumb-item active">Session-Log</li>
            </ol>
        </nav>
    </div>

    <input type="hidden" id="planSessionId" th:value="${planSession.id}">
    <input type="hidden" id="sessionType" th:value="${planSession.sessionType.name()}">

    <!-- Session header -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <span th:if="${planSession.sessionType.name() == 'RUNNING'}" class="badge bg-success fs-6">
                    <i class="bi bi-person-walking me-1"></i>Laufen
                </span>
                <span th:if="${planSession.sessionType.name() == 'BODYWEIGHT'}" class="badge bg-primary fs-6">
                    <i class="bi bi-lightning me-1"></i>K&ouml;rpergewicht
                </span>
                <span class="text-muted">Woche <span th:text="${planSession.weekNumber}"></span> &middot; Einheit <span th:text="${planSession.sessionNumber}"></span></span>
                <span class="text-muted small" th:text="${planSession.description}"></span>
            </div>
        </div>
    </div>

    <!-- Exercises -->
    <div th:each="ex : ${planSession.exercises}" class="card mb-3 exercise-entry"
         th:attr="data-exercise-id=${ex.exercise.id},data-order-index=${ex.orderIndex},data-tracking-type=${ex.exercise.trackingType.name()}">
        <div class="card-body">
            <h6 class="card-title d-flex justify-content-between align-items-center">
                <span>
                    <span class="text-muted me-2" th:text="${ex.orderIndex} + '.'"></span>
                    <span th:text="${ex.exercise.name}"></span>
                </span>
                <span class="badge bg-light text-dark" th:text="${ex.exercise.trackingType.name() == 'SETS_REPS' ? 'Sätze/Wdh.' :
                                                                  ex.exercise.trackingType.name() == 'TIME_BASED' ? 'Zeitbasiert' : 'Distanz/Zeit'}"></span>
            </h6>

            <!-- Media collapsible -->
            <div th:if="${ex.exercise.imageUrl != null or ex.exercise.videoUrl != null}">
                <a class="btn btn-link btn-sm p-0 mb-2" data-bs-toggle="collapse"
                   th:href="'#media_' + ${ex.id}">
                    <i class="bi bi-play-circle me-1"></i>Bild / Video anzeigen
                </a>
                <div th:id="'media_' + ${ex.id}" class="collapse mb-3">
                    <div th:if="${ex.exercise.videoUrl != null}">
                        <iframe width="100%" height="250" th:src="${ex.exercise.videoUrl}"
                                frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div th:if="${ex.exercise.imageUrl != null and ex.exercise.videoUrl == null}">
                        <img th:src="${ex.exercise.imageUrl}" class="img-fluid rounded" style="max-height:200px;">
                    </div>
                </div>
            </div>

            <p class="small text-muted mb-3" th:text="${ex.exercise.description}"></p>

            <!-- SETS_REPS inputs -->
            <div th:if="${ex.exercise.trackingType.name() == 'SETS_REPS'}">
                <div th:each="i : ${#numbers.sequence(1, ex.targetSets ?: 3)}"
                     class="set-row d-flex align-items-center gap-3 mb-2"
                     th:attr="data-set-num=${i}">
                    <span class="fw-semibold" style="min-width:70px">Satz <span th:text="${i}"></span>:</span>
                    <input type="number" class="form-control reps-input" style="width:100px"
                           th:placeholder="${ex.targetReps}" min="0">
                    <span class="text-muted">Wdh. (Ziel: <span th:text="${ex.targetReps ?: '-'}"></span>)</span>
                </div>
            </div>

            <!-- TIME_BASED inputs -->
            <div th:if="${ex.exercise.trackingType.name() == 'TIME_BASED'}" class="d-flex align-items-center gap-3">
                <span>Dauer:</span>
                <input type="number" class="form-control duration-input" style="width:120px"
                       th:placeholder="${ex.targetDurationSeconds}" min="0">
                <span class="text-muted">Sekunden (Ziel: <span th:text="${ex.targetDurationSeconds ?: '-'}"></span> s)</span>
            </div>

            <!-- DISTANCE_DURATION inputs -->
            <div th:if="${ex.exercise.trackingType.name() == 'DISTANCE_DURATION'}" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label small">Distanz (m)</label>
                    <input type="number" class="form-control distance-input"
                           th:placeholder="${ex.targetDistanceMeters ?: '0'}" min="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label small">Dauer (Minuten)</label>
                    <input type="number" class="form-control run-duration-input" placeholder="0" min="0">
                </div>
            </div>

            <div th:if="${ex.notes != null}" class="alert alert-light small mt-2 py-1">
                <i class="bi bi-info-circle me-1"></i><span th:text="${ex.notes}"></span>
            </div>
        </div>
    </div>

    <!-- Summary -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Zusammenfassung</h5>
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Gesamtdauer</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="totalDuration" placeholder="30" min="1">
                        <span class="input-group-text">Minuten</span>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Schwierigkeitsbewertung</label>
                <div class="star-rating d-flex gap-1" id="starRating">
                    <span onclick="setDifficulty(1)">&#9733;</span>
                    <span onclick="setDifficulty(2)">&#9733;</span>
                    <span onclick="setDifficulty(3)">&#9733;</span>
                    <span onclick="setDifficulty(4)">&#9733;</span>
                    <span onclick="setDifficulty(5)">&#9733;</span>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Feedback (optional)</label>
                <textarea class="form-control" id="feedbackText" rows="3"
                          placeholder="Wie war das Training? Was war schwer / leicht?"></textarea>
            </div>
            <button class="btn btn-success btn-lg" onclick="submitLog()">
                <i class="bi bi-check-lg me-2"></i>Training speichern
            </button>
            <a th:href="@{/fitness/plan}" class="btn btn-outline-secondary btn-lg ms-2">Abbrechen</a>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer-js}"/>
</body>
</html>
