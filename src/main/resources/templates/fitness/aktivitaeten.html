<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/header :: header-css}"/>
    <script>
        function filterHistory() {
            var typeFilter = document.getElementById('typeFilter').value;
            document.querySelectorAll('.session-row').forEach(function(row) {
                var rowType = row.dataset.type;
                var show = !typeFilter || rowType === typeFilter;
                row.style.display = show ? '' : 'none';
            });
        }

        function logActivity() {
            var duration = parseInt(document.getElementById('actDuration').value) || null;
            var calories = parseInt(document.getElementById('actCalories').value) || null;
            var notes = document.getElementById('actNotes').value.trim() || null;
            var dateVal = document.getElementById('actDate').value || new Date().toISOString().slice(0,10);

            var btn = document.getElementById('actSaveBtn');
            btn.disabled = true;

            $.ajax({
                url: '/api/fitness/session-log',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    sessionType: 'TEAM_SPORT',
                    logDate: dateVal,
                    actualDurationMinutes: duration,
                    externalCaloriesBurned: calories,
                    feedbackText: notes
                }),
                success: function() { window.location.reload(); },
                error: function() {
                    btn.disabled = false;
                    alert('Fehler beim Speichern der Aktivit\u00e4t.');
                }
            });
        }
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header}"/>
<div th:replace="~{fragments/sidebar :: sidebar}"/>

<main id="main" class="main">

    <div class="pagetitle">
        <h1>Aktivit&auml;ten</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/fitness/overview}">Fitness</a></li>
                <li class="breadcrumb-item active">Aktivit&auml;ten</li>
            </ol>
        </nav>
    </div>

    <!-- Log external activity -->
    <div class="card mb-3">
        <div class="card-body">
            <h5 class="card-title d-flex justify-content-between align-items-center">
                <span><i class="bi bi-dribbble me-2 text-success"></i>Externe Aktivit&auml;t erfassen</span>
                <button class="btn btn-sm btn-outline-success" type="button"
                        data-bs-toggle="collapse" data-bs-target="#activityForm">
                    <i class="bi bi-plus"></i> Hinzuf&uuml;gen
                </button>
            </h5>
            <div class="collapse" id="activityForm">
                <div class="row g-2 mt-1">
                    <div class="col-sm-3">
                        <label class="form-label small">Datum</label>
                        <input type="date" id="actDate" class="form-control form-control-sm"
                               th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
                    </div>
                    <div class="col-sm-3">
                        <label class="form-label small">Notiz</label>
                        <input type="text" id="actNotes" class="form-control form-control-sm"
                               placeholder="z.B. Fu&szlig;ball" value="Fu&szlig;ball"/>
                    </div>
                    <div class="col-sm-3">
                        <label class="form-label small">Dauer (min)</label>
                        <input type="number" id="actDuration" class="form-control form-control-sm"
                               placeholder="90" value="90" min="1"/>
                    </div>
                    <div class="col-sm-3">
                        <label class="form-label small">Kalorien (kcal)</label>
                        <input type="number" id="actCalories" class="form-control form-control-sm"
                               placeholder="800" value="800" min="1"/>
                    </div>
                </div>
                <button id="actSaveBtn" class="btn btn-success btn-sm mt-2" onclick="logActivity()">
                    <i class="bi bi-check me-1"></i>Speichern
                </button>
            </div>
        </div>
    </div>

    <!-- History table -->
    <div class="card">
        <div class="card-body">

            <!-- Filter -->
            <div class="d-flex align-items-center gap-3 mb-3">
                <label class="form-label mb-0">Filtern:</label>
                <select class="form-select w-auto" id="typeFilter" onchange="filterHistory()">
                    <option value="">Alle Typen</option>
                    <option value="RUNNING">Laufen</option>
                    <option value="BODYWEIGHT">K&ouml;rpergewicht</option>
                    <option value="TEAM_SPORT">Teamsport</option>
                </select>
            </div>

            <div th:if="${sessionLogs.isEmpty()}" class="text-center py-5">
                <i class="bi bi-calendar-x text-muted" style="font-size:3rem;"></i>
                <p class="mt-3 text-muted">Noch keine Aktivit&auml;ten protokolliert.</p>
                <a th:href="@{/fitness/plan}" class="btn btn-primary">Zum Trainingsplan</a>
            </div>

            <div th:if="${!sessionLogs.isEmpty()}" class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Datum</th>
                            <th>Typ</th>
                            <th>Status</th>
                            <th>Dauer</th>
                            <th>Pace / Kalorien</th>
                            <th>Schwierigkeit</th>
                            <th>Feedback</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${sessionLogs}"
                            class="session-row"
                            th:attr="data-type=${log.sessionType.name()}">
                            <td>
                                <span th:text="${#temporals.format(log.logDate, 'dd.MM.yyyy')}"></span>
                            </td>
                            <td>
                                <span th:if="${log.sessionType.name() == 'RUNNING'}" class="badge bg-success">
                                    <i class="bi bi-person-walking me-1"></i>Laufen
                                </span>
                                <span th:if="${log.sessionType.name() == 'BODYWEIGHT'}" class="badge bg-primary">
                                    <i class="bi bi-lightning me-1"></i>K&ouml;rpergewicht
                                </span>
                                <span th:if="${log.sessionType.name() == 'TEAM_SPORT'}" class="badge bg-warning text-dark">
                                    <i class="bi bi-dribbble me-1"></i>Teamsport
                                </span>
                            </td>
                            <td>
                                <span th:if="${log.status.name() == 'COMPLETED'}" class="badge bg-success">
                                    <i class="bi bi-check-lg me-1"></i>Abgeschlossen
                                </span>
                                <span th:if="${log.status.name() == 'SKIPPED'}" class="badge bg-secondary">
                                    <i class="bi bi-skip-forward me-1"></i>&Uuml;bersprungen
                                    <span th:if="${log.skipReason != null}"
                                          th:text="' · ' + ${log.skipReason.name() == 'SICK' ? 'Krank' :
                                                         log.skipReason.name() == 'NO_TIME' ? 'Keine Zeit' :
                                                         log.skipReason.name() == 'OTHER_SPORT' ? 'Anderer Sport' : 'Anderes'}">
                                    </span>
                                </span>
                            </td>
                            <td>
                                <span th:if="${log.actualDurationMinutes != null}"
                                      th:text="${log.actualDurationMinutes} + ' min'"></span>
                                <span th:if="${log.actualDurationMinutes == null}" class="text-muted">&mdash;</span>
                            </td>
                            <td>
                                <span th:if="${log.paceDisplay != null}" class="text-success small fw-semibold"
                                      th:text="${log.paceDisplay}"></span>
                                <span th:if="${log.totalDistanceMeters != null}" class="text-muted small ms-1"
                                      th:text="'(' + ${#numbers.formatDecimal(log.totalDistanceMeters / 1000.0, 1, 2)} + ' km)'"></span>
                                <span th:if="${log.externalCaloriesBurned != null}" class="badge bg-success"
                                      th:text="'~' + ${log.externalCaloriesBurned} + ' kcal'"></span>
                                <span th:if="${log.paceDisplay == null and log.externalCaloriesBurned == null}" class="text-muted">&mdash;</span>
                            </td>
                            <td>
                                <span th:if="${log.difficultyRating != null}">
                                    <span th:each="i : ${#numbers.sequence(1, 5)}"
                                          th:text="${i <= log.difficultyRating ? '★' : '☆'}"
                                          th:style="${i <= log.difficultyRating ? 'color:#ffc107' : 'color:#ccc'}"></span>
                                </span>
                                <span th:if="${log.difficultyRating == null}" class="text-muted">&mdash;</span>
                            </td>
                            <td class="text-muted small">
                                <span th:if="${log.feedbackText != null}"
                                      th:text="${#strings.abbreviate(log.feedbackText, 60)}"></span>
                                <span th:if="${log.skipNotes != null and log.feedbackText == null}"
                                      th:text="${#strings.abbreviate(log.skipNotes, 60)}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer-js}"/>
</body>
</html>
