<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/header :: header-css}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #f8f9fa; }
        #main { padding-bottom: 80px; }
        .exercise-card { font-size: 1.05rem; }
        .star-rating { font-size: 2rem; cursor: pointer; }
        .star-rating span { color: #ccc; }
        .star-rating span.active { color: #ffc107; }
        .rest-timer-display { font-size: 2.5rem; font-weight: bold; color: #0d6efd; }
        .main-timer { font-size: 3rem; font-weight: bold; letter-spacing: 2px; }
        .set-row { margin-bottom: 0.5rem; }
    </style>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var session = /*[[${planSession}]]*/ null;
        var sessionType = session ? session.sessionType : 'BODYWEIGHT';
        var exercises = session ? session.exercises : [];

        var currentExIdx = 0;
        var wakeLockHandle = null;
        var mainTimerInterval = null;
        var mainTimerSeconds = 0;
        var restTimerInterval = null;
        var exerciseTimerInterval = null;
        var exerciseTimerSeconds = 0;
        var exerciseCountdownInterval = null;
        var exerciseCountdownRemaining = 0;
        var pendingCountdown = null;
        var exerciseLogs = [];
        var difficultyRating = 0;
        var runningTimerRunning = false;
        var restOnDone = null;

        // === Sound system (Web Audio API) ===
        var audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
            return audioCtx;
        }
        function playTone(freq, dur, vol) {
            var ctx = getAudioCtx(); if (!ctx) return;
            try {
                var osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq; osc.type = 'sine';
                gain.gain.setValueAtTime(vol || 0.25, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                osc.start(); osc.stop(ctx.currentTime + dur);
            } catch(e) {}
        }
        function beepStart() { playTone(880, 0.35); }   // high — exercise starts / rest ends
        function beepRest()  { playTone(440, 0.55); }   // low  — rest starts
        function beepTick()  { playTone(660, 0.12, 0.18); } // mid — countdown tick

        // Wake Lock — for all training modes
        function requestWakeLock() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen')
                    .then(function(lock) { wakeLockHandle = lock; })
                    .catch(function() {});
            }
        }

        function releaseWakeLock() {
            if (wakeLockHandle) {
                wakeLockHandle.release().catch(function() {});
                wakeLockHandle = null;
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') releaseWakeLock();
            else requestWakeLock();
        });

        // Timers
        function formatTime(secs) {
            var h = Math.floor(secs / 3600);
            var m = Math.floor((secs % 3600) / 60);
            var s = secs % 60;
            if (h > 0) return pad(h) + ':' + pad(m) + ':' + pad(s);
            return pad(m) + ':' + pad(s);
        }
        function pad(n) { return n < 10 ? '0' + n : '' + n; }

        function startMainTimer() {
            if (mainTimerInterval) return;
            mainTimerInterval = setInterval(function() {
                mainTimerSeconds++;
                document.getElementById('mainTimerDisplay').textContent = formatTime(mainTimerSeconds);
            }, 1000);
        }

        // Exercise countdown (for time-based exercises)
        function startExerciseCountdown(seconds, onDone) {
            if (exerciseCountdownInterval) clearInterval(exerciseCountdownInterval);
            exerciseCountdownRemaining = seconds;
            updateCountdownDisplay();
            beepStart();
            exerciseCountdownInterval = setInterval(function() {
                exerciseCountdownRemaining--;
                updateCountdownDisplay();
                if (exerciseCountdownRemaining <= 3 && exerciseCountdownRemaining > 0) beepTick();
                if (exerciseCountdownRemaining <= 0) {
                    clearInterval(exerciseCountdownInterval); exerciseCountdownInterval = null;
                    beepStart();
                    if (onDone) onDone();
                }
            }, 1000);
        }

        function stopExerciseCountdown() {
            if (exerciseCountdownInterval) { clearInterval(exerciseCountdownInterval); exerciseCountdownInterval = null; }
        }

        function restartExerciseCountdown(seconds, onDone) {
            stopExerciseCountdown();
            startExerciseCountdown(seconds, onDone);
        }

        function updateCountdownDisplay() {
            var el = document.getElementById('exerciseTimerDisplay');
            if (el) el.textContent = formatTime(exerciseCountdownRemaining);
        }

        // Legacy count-up (kept for compatibility)
        function startExerciseTimer() {}
        function stopExerciseTimer() { stopExerciseCountdown(); }
        function resetExerciseTimer() { stopExerciseCountdown(); }

        function startRestTimer(seconds, onDone) {
            var remaining = seconds;
            restOnDone = onDone;
            beepRest();
            document.getElementById('restOverlay').style.display = 'flex';
            document.getElementById('restTimerDisplay').textContent = remaining + ' s';
            if (restTimerInterval) clearInterval(restTimerInterval);
            restTimerInterval = setInterval(function() {
                remaining--;
                document.getElementById('restTimerDisplay').textContent = remaining + ' s';
                if (remaining <= 3 && remaining > 0) beepTick();
                if (remaining <= 0) {
                    clearInterval(restTimerInterval); restTimerInterval = null;
                    document.getElementById('restOverlay').style.display = 'none';
                    beepStart();
                    if (onDone) onDone();
                }
            }, 1000);
        }

        function skipRest() {
            if (restTimerInterval) { clearInterval(restTimerInterval); restTimerInterval = null; }
            document.getElementById('restOverlay').style.display = 'none';
            var cb = restOnDone;
            restOnDone = null;
            if (cb) cb();
        }

        // Bodyweight mode
        function renderBodyweightExercise() {
            stopExerciseCountdown();
            pendingCountdown = null;
            if (currentExIdx >= exercises.length) {
                renderSummary();
                return;
            }
            var ex = exercises[currentExIdx];
            var exData = ex.exercise;
            var html = '<div class="exercise-card">';
            html += '<div class="text-muted small mb-1">Übung ' + (currentExIdx + 1) + ' / ' + exercises.length + ' · Woche ' + session.weekNumber + '</div>';
            html += '<h4>' + exData.name + '</h4>';
            html += '<p class="text-muted small">' + (exData.description || '') + '</p>';
            beepStart();

            // Media
            if (exData.videoUrl) {
                var youtubeMatch = exData.videoUrl.match(
                    /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/|v\/)|youtu\.be\/)([A-Za-z0-9_\-]{11})/
                );
                if (youtubeMatch) {
                    html += '<div class="mb-3"><iframe width="100%" height="220" src="https://www.youtube.com/embed/' + youtubeMatch[1] + '" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>';
                } else {
                    html += '<div class="mb-3"><video src="' + exData.videoUrl + '" controls style="width:100%; height:220px;"></video></div>';
                }
            } else if (exData.imageUrl) {
                html += '<div class="mb-3"><img src="' + exData.imageUrl + '" class="img-fluid rounded" style="max-height:200px;" onerror="this.style.display=\'none\'"></div>';
            }

            // Sets/Reps or Time
            if (ex.targetSets && ex.targetReps) {
                html += '<div id="setsContainer">';
                for (var i = 1; i <= ex.targetSets; i++) {
                    html += '<div class="set-row d-flex align-items-center gap-3">';
                    html += '<span class="fw-semibold" style="min-width:60px">Satz ' + i + ':</span>';
                    html += '<input type="number" class="form-control" style="width:100px" id="set_' + i + '" placeholder="' + ex.targetReps + '" min="0">';
                    html += '<span class="text-muted">Wdh.</span>';
                    html += '</div>';
                }
                html += '</div>';
            } else if (ex.targetDurationSeconds) {
                var dur = ex.targetDurationSeconds;
                pendingCountdown = dur;
                html += '<div class="mb-3">';
                html += '<div class="text-muted small mb-1">Ziel: ' + dur + ' Sekunden — Countdown läuft automatisch</div>';
                html += '<div id="exerciseTimerDisplay" class="main-timer my-2">' + formatTime(dur) + '</div>';
                html += '<div class="d-flex gap-2">';
                html += '<button class="btn btn-danger btn-sm" onclick="stopExerciseCountdown()"><i class="bi bi-stop-fill"></i> Stop</button>';
                html += '<button class="btn btn-outline-secondary btn-sm" onclick="restartExerciseCountdown(' + dur + ', function(){nextExercise();})"><i class="bi bi-arrow-counterclockwise"></i> Neu</button>';
                html += '</div>';
                html += '</div>';
            }

            if (ex.notes) {
                html += '<div class="alert alert-light small mt-2 py-1"><i class="bi bi-info-circle me-1"></i>' + ex.notes + '</div>';
            }

            // Next exercise preview
            if (currentExIdx + 1 < exercises.length) {
                var nextEx = exercises[currentExIdx + 1];
                html += '<div class="mt-4 pt-3 border-top text-muted small">';
                html += '<div class="text-uppercase fw-semibold mb-1" style="font-size:0.7rem;letter-spacing:0.05em;"><i class="bi bi-skip-forward me-1"></i>Als nächstes</div>';
                html += '<div class="d-flex align-items-center gap-2">';
                html += '<span class="fw-semibold">' + nextEx.exercise.name + '</span>';
                if (nextEx.targetSets && nextEx.targetReps) {
                    html += '<span>' + nextEx.targetSets + '×' + nextEx.targetReps + '</span>';
                } else if (nextEx.targetDurationSeconds) {
                    html += '<span>' + nextEx.targetDurationSeconds + ' s</span>';
                }
                html += '</div>';
                if (nextEx.exercise.description) {
                    html += '<div class="text-muted" style="font-size:0.8rem;">' + nextEx.exercise.description + '</div>';
                }
                html += '</div>';
            }

            html += '<div class="d-flex gap-2 mt-4">';
            if (currentExIdx > 0) {
                html += '<button class="btn btn-outline-secondary" onclick="prevExercise()"><i class="bi bi-arrow-left me-1"></i>Zurück</button>';
            }
            html += '<button class="btn btn-primary ms-auto" onclick="nextExercise()" id="nextBtn">Weiter <i class="bi bi-arrow-right ms-1"></i></button>';
            html += '</div>';
            html += '</div>';
            document.getElementById('exerciseArea').innerHTML = html;
            if (pendingCountdown) {
                var cd = pendingCountdown; pendingCountdown = null;
                startExerciseCountdown(cd, function() { nextExercise(); });
            }
        }

        function collectCurrentExerciseLog() {
            var ex = exercises[currentExIdx];
            var log = { exerciseId: ex.exercise.id, orderIndex: ex.orderIndex };
            if (ex.targetSets && ex.targetReps) {
                for (var i = 1; i <= ex.targetSets; i++) {
                    var input = document.getElementById('set_' + i);
                    var reps = input ? parseInt(input.value) || ex.targetReps : ex.targetReps;
                    exerciseLogs.push({ exerciseId: ex.exercise.id, orderIndex: ex.orderIndex, setNumber: i, repsDone: reps });
                }
            } else if (ex.targetDurationSeconds) {
                var elapsed = ex.targetDurationSeconds - exerciseCountdownRemaining;
                exerciseLogs.push({ exerciseId: ex.exercise.id, orderIndex: ex.orderIndex, durationSeconds: elapsed > 0 ? elapsed : ex.targetDurationSeconds });
                stopExerciseCountdown();
            }
        }

        function nextExercise() {
            collectCurrentExerciseLog();
            var ex = exercises[currentExIdx];
            var restSecs = ex.restSeconds || 60;
            currentExIdx++;
            if (restSecs > 0 && currentExIdx < exercises.length) {
                startRestTimer(restSecs, renderBodyweightExercise);
            } else {
                renderBodyweightExercise();
            }
        }

        function prevExercise() {
            currentExIdx = Math.max(0, currentExIdx - 1);
            renderBodyweightExercise();
        }

        // Running mode — per-exercise card view
        function renderRunningExercise() {
            stopExerciseCountdown();
            pendingCountdown = null;
            var area = document.getElementById('runningExerciseArea');
            if (!area) return;
            if (currentExIdx >= exercises.length) {
                area.innerHTML = '<button class="btn btn-success btn-lg w-100" onclick="renderSummary()"><i class="bi bi-flag-fill me-2"></i>Training beenden &amp; auswerten</button>';
                return;
            }
            var ex = exercises[currentExIdx];
            var exData = ex.exercise;
            var html = '<div class="exercise-card">';
            html += '<div class="text-muted small mb-1">Übung ' + (currentExIdx + 1) + ' / ' + exercises.length + '</div>';
            html += '<h4>' + exData.name + '</h4>';
            html += '<p class="text-muted small">' + (exData.description || '') + '</p>';

            // Image
            if (exData.imageUrl) {
                html += '<div class="mb-3"><img src="' + exData.imageUrl + '" class="img-fluid rounded" style="max-height:160px;" onerror="this.style.display=\'none\'"></div>';
            }

            // Target info
            if (ex.targetDurationRunSeconds) {
                var dur = ex.targetDurationRunSeconds;
                pendingCountdown = dur;
                html += '<div class="mb-3">';
                html += '<div class="text-muted small mb-1">Ziel: ' + formatTime(dur) + ' — Countdown läuft automatisch</div>';
                html += '<div id="exerciseTimerDisplay" class="main-timer my-2">' + formatTime(dur) + '</div>';
                html += '<div class="d-flex gap-2 justify-content-center">';
                html += '<button class="btn btn-danger btn-sm" onclick="stopExerciseCountdown()"><i class="bi bi-stop-fill"></i> Stop</button>';
                html += '<button class="btn btn-outline-secondary btn-sm" onclick="restartExerciseCountdown(' + dur + ', function(){advanceRunningExercise();})"><i class="bi bi-arrow-counterclockwise"></i> Neu</button>';
                html += '</div>';
                html += '</div>';
            } else if (ex.targetDistanceMeters) {
                html += '<div class="alert alert-info py-2 mb-3">Ziel: <strong>' + ex.targetDistanceMeters + ' m</strong></div>';
            } else if (ex.targetDurationSeconds) {
                var dur2 = ex.targetDurationSeconds;
                pendingCountdown = dur2;
                html += '<div class="mb-3">';
                html += '<div class="text-muted small mb-1">Ziel: ' + dur2 + ' s — Countdown läuft automatisch</div>';
                html += '<div id="exerciseTimerDisplay" class="main-timer my-2">' + formatTime(dur2) + '</div>';
                html += '<div class="d-flex gap-2 justify-content-center">';
                html += '<button class="btn btn-danger btn-sm" onclick="stopExerciseCountdown()"><i class="bi bi-stop-fill"></i> Stop</button>';
                html += '<button class="btn btn-outline-secondary btn-sm" onclick="restartExerciseCountdown(' + dur2 + ', function(){advanceRunningExercise();})"><i class="bi bi-arrow-counterclockwise"></i> Neu</button>';
                html += '</div>';
                html += '</div>';
            }

            if (ex.notes) {
                html += '<div class="alert alert-light small mt-2 py-1"><i class="bi bi-info-circle me-1"></i>' + ex.notes + '</div>';
            }

            // Next exercise preview
            if (currentExIdx + 1 < exercises.length) {
                var nextEx = exercises[currentExIdx + 1];
                html += '<div class="mt-3 pt-3 border-top text-muted small">';
                html += '<div class="text-uppercase fw-semibold mb-1" style="font-size:0.7rem;letter-spacing:0.05em;"><i class="bi bi-skip-forward me-1"></i>Als nächstes</div>';
                html += '<span class="fw-semibold">' + nextEx.exercise.name + '</span>';
                if (nextEx.targetDurationRunSeconds) html += ' · ' + formatTime(nextEx.targetDurationRunSeconds);
                else if (nextEx.targetDistanceMeters) html += ' · ' + nextEx.targetDistanceMeters + ' m';
                if (nextEx.exercise.description) html += '<div style="font-size:0.8rem;">' + nextEx.exercise.description + '</div>';
                html += '</div>';
            }

            html += '<div class="d-flex gap-2 mt-4">';
            if (currentExIdx > 0) {
                html += '<button class="btn btn-outline-secondary" onclick="currentExIdx--;renderRunningExercise()"><i class="bi bi-arrow-left me-1"></i>Zurück</button>';
            }
            html += '<button class="btn btn-primary ms-auto" onclick="advanceRunningExercise()">Weiter <i class="bi bi-arrow-right ms-1"></i></button>';
            html += '</div>';
            html += '</div>';

            area.innerHTML = html;
            beepStart();
            if (pendingCountdown) {
                var cd = pendingCountdown; pendingCountdown = null;
                startExerciseCountdown(cd, function() { advanceRunningExercise(); });
            }
        }

        function advanceRunningExercise() {
            stopExerciseCountdown();
            var ex = exercises[currentExIdx];
            currentExIdx++;
            var restSecs = ex.restSeconds || 0;
            if (restSecs > 0 && currentExIdx < exercises.length) {
                startRestTimer(restSecs, renderRunningExercise);
            } else {
                renderRunningExercise();
            }
        }

        function toggleRunningTimer() {
            if (!runningTimerRunning) {
                startMainTimer();
                runningTimerRunning = true;
                document.getElementById('runStartBtn').innerHTML = '<i class="bi bi-pause-fill me-1"></i>Pause';
            } else {
                clearInterval(mainTimerInterval); mainTimerInterval = null;
                runningTimerRunning = false;
                document.getElementById('runStartBtn').innerHTML = '<i class="bi bi-play-fill me-1"></i>Weiter';
            }
        }

        // Summary / submit
        function setDifficulty(val) {
            difficultyRating = val;
            document.querySelectorAll('.star-rating span').forEach(function(s, i) {
                s.classList.toggle('active', i < val);
            });
        }

        function renderSummary() {
            releaseWakeLock();
            var html = '<div class="text-center mb-4"><i class="bi bi-trophy-fill text-warning" style="font-size:3rem;"></i><h4 class="mt-2">Training abgeschlossen!</h4></div>';
            html += '<div class="mb-3"><label class="form-label fw-semibold">Schwierigkeit (1–5 Sterne)</label>';
            html += '<div class="star-rating d-flex gap-1 justify-content-center mb-2" id="starRating">';
            for (var i = 1; i <= 5; i++) {
                html += '<span onclick="setDifficulty(' + i + ')">&#9733;</span>';
            }
            html += '</div></div>';
            html += '<div class="mb-3"><label class="form-label">Feedback (optional)</label>';
            html += '<textarea class="form-control" id="feedbackText" rows="3" placeholder="Wie war das Training?"></textarea></div>';
            html += '<div class="mb-3"><label class="form-label">Gesamtdauer (Minuten)</label>';
            html += '<input type="number" class="form-control" id="totalDuration" value="' + Math.round(mainTimerSeconds / 60) + '" min="1">';
            html += '</div>';
            if (sessionType === 'RUNNING') {
                html += '<div class="mb-3"><label class="form-label">Zur&uuml;ckgelegte Distanz (m)</label>';
                html += '<input type="number" class="form-control" id="runDistanceMeters" placeholder="z. B. 3000 m" min="0"></div>';
            }
            html += '<button class="btn btn-success btn-lg w-100" onclick="submitLog()"><i class="bi bi-check-lg me-2"></i>Training speichern</button>';
            document.getElementById('exerciseArea').innerHTML = html;
            document.getElementById('progressHeader').style.display = 'none';
        }

        function submitLog() {
            var duration = parseInt(document.getElementById('totalDuration').value) || Math.round(mainTimerSeconds / 60);
            var feedback = document.getElementById('feedbackText') ? document.getElementById('feedbackText').value : '';

            var logs = exerciseLogs;
            if (sessionType === 'RUNNING') {
                var distInput = document.getElementById('runDistanceMeters');
                var dist = distInput ? parseInt(distInput.value) || 0 : 0;
                if (exercises.length > 0) {
                    logs = [{ exerciseId: exercises[0].exercise.id, orderIndex: 1, distanceMeters: dist, durationRunSeconds: mainTimerSeconds }];
                }
            }

            var payload = {
                planSessionId: session.id,
                sessionType: sessionType,
                logDate: new Date().toISOString().slice(0, 10),
                actualDurationMinutes: duration,
                difficultyRating: difficultyRating || null,
                feedbackText: feedback || null,
                exercises: logs
            };

            var btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Speichern...';

            $.ajax({
                url: '/api/fitness/session-log',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function() { window.location.href = '/fitness/history'; },
                error: function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check-lg me-2"></i>Training speichern';
                    alert('Fehler beim Speichern. Bitte erneut versuchen.');
                }
            });
        }

        $(document).ready(function() {
            requestWakeLock();
            startMainTimer();

            if (sessionType === 'BODYWEIGHT') {
                renderBodyweightExercise();
            } else if (sessionType === 'RUNNING') {
                renderRunningExercise();
            }
        });
        /*]]>*/
    </script>
</head>
<body>

<div th:replace="~{fragments/header :: header}"/>
<div th:replace="~{fragments/sidebar :: sidebar}"/>

<main id="main" class="main">

    <div class="pagetitle" id="progressHeader">
        <h1>
            <span th:if="${planSession.sessionType.name() == 'RUNNING'}"><i class="bi bi-person-walking me-2"></i>Laufeinheit</span>
            <span th:if="${planSession.sessionType.name() == 'BODYWEIGHT'}"><i class="bi bi-lightning me-2"></i>Krafttraining</span>
        </h1>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted">Woche <span th:text="${planSession.weekNumber}"></span> &middot; Einheit <span th:text="${planSession.sessionNumber}"></span></span>
            <span class="fw-bold" id="mainTimerDisplay">00:00</span>
        </div>
    </div>

    <!-- Running mode -->
    <div th:if="${planSession.sessionType.name() == 'RUNNING'}">
        <!-- Overall timer + controls -->
        <div class="card mb-3">
            <div class="card-body text-center py-3">
                <div class="main-timer" id="runTimerDisplay">00:00</div>
                <div class="d-flex gap-2 justify-content-center mt-2">
                    <button class="btn btn-primary btn-lg" id="runStartBtn" onclick="toggleRunningTimer()">
                        <i class="bi bi-play-fill me-1"></i>Start
                    </button>
                    <button class="btn btn-success btn-lg" onclick="renderSummary()">
                        <i class="bi bi-flag-fill me-1"></i>Beenden
                    </button>
                </div>
                <p class="text-muted small mt-2 mb-0" th:text="${planSession.description}"></p>
            </div>
        </div>
        <!-- Current exercise card (JS-rendered) -->
        <div class="card" th:if="${not #lists.isEmpty(planSession.exercises)}">
            <div class="card-body" id="runningExerciseArea">
                <div class="text-center py-3">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2 text-muted">Lade Training...</p>
                </div>
            </div>
        </div>
        <!-- Fallback if no exercises -->
        <div class="card mt-3" th:if="${#lists.isEmpty(planSession.exercises)}">
            <div class="card-body" id="exerciseArea">
                <button class="btn btn-success btn-lg w-100" onclick="renderSummary()">
                    <i class="bi bi-flag-fill me-2"></i>Training beenden &amp; auswerten
                </button>
            </div>
        </div>
    </div>

    <!-- Bodyweight mode -->
    <div th:if="${planSession.sessionType.name() == 'BODYWEIGHT'}">
        <div class="card">
            <div class="card-body" id="exerciseArea">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2 text-muted">Lade Training...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Rest overlay -->
    <div id="restOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;">
        <h4>Pause</h4>
        <div class="rest-timer-display" id="restTimerDisplay" style="color:#fff;">60 s</div>
        <button class="btn btn-light mt-3" onclick="skipRest()">Pause &uuml;berspringen</button>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer-js}"/>
<script>
    // Sync running timer card display with main timer in header
    setInterval(function() {
        var d = document.getElementById('runTimerDisplay');
        var src = document.getElementById('mainTimerDisplay');
        if (d && src) d.textContent = src.textContent;
    }, 500);
</script>
</body>
</html>
